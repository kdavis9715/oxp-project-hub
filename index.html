<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OXP Project Hub</title>
<!-- Trail Mix Web design system fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

<style>
/* ═══════════════════════════════════════════════════════════════
   TRAIL MIX DESIGN TOKENS — Outside brand / light mode
   Source: Trail Mix Web + Content Utilities (Figma)
═══════════════════════════════════════════════════════════════ */
:root {
  /* ── Neutral ramp ── */
  --neutral-100: #f9f9f9;
  --neutral-200: #f0f0f0;
  --neutral-300: #e5e5e5;
  --neutral-400: #c2c2c2;
  --neutral-500: #737373;
  --neutral-600: #5a5a5a;
  --neutral-700: #4e4e4e;
  --neutral-800: #333333;
  --neutral-900: #222222;

  /* ── Outside brand ── */
  --brand-primary:          #000000;
  --brand-primary-hover:    rgba(0,0,0,0.85);
  --brand-primary-highlight:rgba(0,0,0,0.05);
  --brand-accent:           #ffd100;   /* yellow-500 */
  --brand-accent-light:     #ffe366;   /* yellow-400 */

  /* ── Semantic ── */
  --color-bg-page:          var(--neutral-100);
  --color-bg-default:       #ffffff;
  --color-bg-subtle:        var(--neutral-200);
  --color-bg-header:        var(--brand-primary);
  --color-border:           var(--neutral-300);
  --color-border-strong:    var(--neutral-400);
  --color-text-default:     var(--neutral-900);
  --color-text-secondary:   var(--neutral-700);
  --color-text-subtle:      var(--neutral-500);
  --color-text-inverted:    #ffffff;
  --color-shadow:           rgba(0,0,0,0.10);

  /* ── Status ── */
  --color-success:   #078a14;
  --color-warning:   #d06000;
  --color-danger:    #c0392b;
  --color-info:      #0064b0;

  /* ── Typography — Trail Mix Web ── */
  --font-headline: 'Plus Jakarta Sans', -apple-system, sans-serif;
  --font-body:     'Merriweather', Georgia, serif;
  --font-ui:       'Plus Jakarta Sans', -apple-system, sans-serif;

  /* type/headline */
  --type-h1-size: 44px;  --type-h1-lh: 120%;  --type-h1-weight: 800;
  --type-h2-size: 35px;  --type-h2-lh: 120%;  --type-h2-weight: 800;
  --type-h3-size: 28px;  --type-h3-lh: 130%;  --type-h3-weight: 800;
  --type-h4-size: 25px;  --type-h4-lh: 125%;  --type-h4-weight: 800;
  --type-h5-size: 22px;  --type-h5-lh: 135%;  --type-h5-weight: 700;
  --type-h6-size: 20px;  --type-h6-lh: 140%;  --type-h6-weight: 700;
  --type-h7-size: 18px;  --type-h7-lh: 145%;  --type-h7-weight: 700;
  --type-h8-size: 16px;  --type-h8-lh: 145%;  --type-h8-weight: 700;

  /* type/paragraph */
  --type-para-lg: 18px; --type-para-lg-lh: 180%;
  --type-para-md: 16px; --type-para-md-lh: 170%;
  --type-para-sm: 14px; --type-para-sm-lh: 165%;

  /* type/ui (u1–u4) */
  --type-u1: 16px; --type-u1-lh: 24px;
  --type-u2: 14px; --type-u2-lh: 20px;
  --type-u3: 12px; --type-u3-lh: 18px;
  --type-u4: 10px; --type-u4-lh: 16px;

  /* type/button */
  --type-btn-lg: 18px; --type-btn-md: 16px;
  --type-btn-sm: 14px; --type-btn-xs: 12px;

  /* spacing */
  --space-1: 4px;  --space-2: 8px;  --space-3: 12px;
  --space-4: 16px; --space-5: 20px; --space-6: 24px;
  --space-8: 32px; --space-10: 40px;
  --radius-sm: 4px; --radius-md: 8px; --radius-lg: 12px;
}

/* ─── Reset ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-ui);
  background: var(--color-bg-page);
  color: var(--color-text-default);
  font-size: var(--type-u2);
  line-height: var(--type-u2-lh);
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════════════════════════════
   HEADER  — Outside black
═══════════════════════════════════════════════════════════════ */
.site-header {
  background: var(--color-bg-header);
  color: var(--color-text-inverted);
  padding: 0 var(--space-8);
  display: flex; align-items: center; justify-content: space-between;
  height: 60px; position: sticky; top: 0; z-index: 100;
}
.site-header .logo {
  display: flex; align-items: center; gap: var(--space-3);
}
.site-header .badge {
  background: var(--brand-accent);
  color: var(--brand-primary);
  font-family: var(--font-headline);
  font-size: var(--type-u3); font-weight: 800;
  letter-spacing: 1px; padding: 4px 10px;
  border-radius: var(--radius-sm);
  text-transform: uppercase;
}
.site-header h1 {
  font-family: var(--font-headline);
  font-size: var(--type-h8-size);
  font-weight: var(--type-h8-weight);
  line-height: var(--type-h8-lh);
  letter-spacing: -0.2px;
}
.header-meta {
  font-family: var(--font-ui);
  font-size: var(--type-u4); font-weight: 500;
  color: rgba(255,255,255,0.55);
}

/* ═══════════════════════════════════════════════════════════════
   NAV TABS
═══════════════════════════════════════════════════════════════ */
.nav-tabs {
  background: var(--color-bg-default);
  border-bottom: 1.5px solid var(--color-border);
  display: flex; padding: 0 var(--space-8);
  position: sticky; top: 60px; z-index: 99;
  box-shadow: 0 1px 0 var(--color-shadow);
}
.nav-tab {
  padding: 14px var(--space-5);
  cursor: pointer; border: none; background: none;
  font-family: var(--font-ui);
  font-size: var(--type-u3); font-weight: 700;
  color: var(--color-text-subtle);
  border-bottom: 3px solid transparent;
  transition: color .15s, border-color .15s;
  display: flex; align-items: center; gap: var(--space-2);
  letter-spacing: .1px;
}
.nav-tab:hover { color: var(--color-text-default); }
.nav-tab.active {
  color: var(--brand-primary);
  border-bottom-color: var(--brand-primary);
}
.nav-tab .icon { font-size: 15px; }

/* ═══════════════════════════════════════════════════════════════
   SECTIONS
═══════════════════════════════════════════════════════════════ */
.section { display: none; padding: var(--space-6) var(--space-8); max-width: 1440px; margin: 0 auto; }
.section.active { display: block; }

/* ─── Section header ─── */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: var(--space-5);
}
.section-title {
  font-family: var(--font-headline);
  font-size: var(--type-h7-size);
  font-weight: var(--type-h7-weight);
  line-height: var(--type-h7-lh);
  color: var(--color-text-default);
}

/* ─── Buttons — Trail Mix button/md ─── */
.btn {
  background: var(--brand-primary);
  color: var(--color-text-inverted);
  border: none; border-radius: var(--radius-sm);
  padding: 9px var(--space-4);
  font-family: var(--font-ui);
  font-size: var(--type-btn-sm); font-weight: 700;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  transition: opacity .15s;
  letter-spacing: .1px;
}
.btn:hover { opacity: .82; }
.btn.secondary {
  background: transparent;
  color: var(--color-text-default);
  border: 1.5px solid var(--color-border-strong);
}
.btn.secondary:hover { background: var(--brand-primary-highlight); }
.btn.danger { background: var(--color-danger); }
.btn-group { display: flex; gap: var(--space-2); }

/* ─── Card ─── */
.card {
  background: var(--color-bg-default);
  border-radius: var(--radius-md);
  border: 1.5px solid var(--color-border);
  box-shadow: 0 1px 3px var(--color-shadow);
}

/* ─── Status badges ─── */
.status-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 20px;
  font-family: var(--font-ui);
  font-size: var(--type-u4); font-weight: 700;
  letter-spacing: .2px;
}
.status-badge.on-track    { background: #e5f5e7; color: #0c6b17; }
.status-badge.at-risk     { background: #fff4e0; color: #9a4200; }
.status-badge.delayed     { background: #fce9e9; color: var(--color-danger); }
.status-badge.complete    { background: var(--neutral-200); color: var(--neutral-800); }
.status-badge.not-started { background: var(--neutral-200); color: var(--color-text-subtle); }

/* ═══════════════════════════════════════════════════════════════
   GANTT CHART
═══════════════════════════════════════════════════════════════ */
.gantt-wrap {
  overflow-x: auto;
  border-radius: var(--radius-md);
  border: 1.5px solid var(--color-border);
  background: var(--color-bg-default);
}
.gantt-table { border-collapse: collapse; width: 100%; }
.gantt-table th {
  background: var(--neutral-100);
  color: var(--color-text-subtle);
  font-family: var(--font-ui);
  font-size: var(--type-u4); font-weight: 700;
  text-transform: uppercase; letter-spacing: .6px;
  padding: 10px var(--space-3);
  border-bottom: 1.5px solid var(--color-border);
  white-space: nowrap;
}
.gantt-table td {
  padding: 8px var(--space-3);
  border-bottom: 1px solid var(--neutral-200);
  vertical-align: middle;
  font-family: var(--font-ui);
  font-size: var(--type-u2);
}
.gantt-table tr:last-child td { border-bottom: none; }
.gantt-table tr:hover td { background: var(--neutral-100); }
.gantt-table tr.group-row td {
  padding: 10px var(--space-3) 4px;
  font-size: var(--type-u4); font-weight: 800;
  text-transform: uppercase; letter-spacing: .7px;
  color: var(--color-text-subtle);
  background: #fafafa;
}

.gantt-label-col    { min-width: 180px; max-width: 220px; }
.gantt-owner-col    { min-width: 110px; }
.gantt-status-col   { min-width: 100px; }
.gantt-timeline-col { min-width: 600px; position: relative; }

/* Timeline month headers */
.timeline-header {
  display: flex; height: 34px;
  border-bottom: 1.5px solid var(--color-border);
}
.timeline-month {
  flex: none; display: flex; align-items: center; justify-content: center;
  font-family: var(--font-ui);
  font-size: var(--type-u4); font-weight: 700;
  text-transform: uppercase; letter-spacing: .5px;
  color: var(--color-text-subtle);
  background: var(--neutral-100);
  border-right: 1px solid var(--color-border);
}

/* Gantt bars */
.gantt-bar-cell { position: relative; height: 36px; }
.gantt-bar {
  position: absolute; height: 20px; top: 8px;
  border-radius: var(--radius-sm);
  cursor: grab; display: flex; align-items: center; justify-content: center;
  font-family: var(--font-ui);
  font-size: var(--type-u4); font-weight: 700;
  color: white; overflow: hidden; white-space: nowrap;
  user-select: none; transition: box-shadow .15s;
  box-shadow: 0 1px 3px rgba(0,0,0,.18);
}
.gantt-bar:hover { box-shadow: 0 2px 8px rgba(0,0,0,.28); }
.gantt-bar.dragging { cursor: grabbing; box-shadow: 0 4px 16px rgba(0,0,0,.32); opacity: .9; }
.gantt-bar .resize-handle {
  position: absolute; right: 0; top: 0; bottom: 0; width: 8px;
  cursor: ew-resize; background: rgba(0,0,0,.18);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}
.gantt-actions button {
  background: none; border: none; cursor: pointer;
  padding: 3px 5px; border-radius: var(--radius-sm);
  color: var(--color-text-subtle); font-size: 14px;
}
.gantt-actions button:hover { background: var(--neutral-200); color: var(--color-danger); }

/* ═══════════════════════════════════════════════════════════════
   STATUS REPORTS
═══════════════════════════════════════════════════════════════ */
.report-list { display: flex; flex-direction: column; gap: var(--space-3); }
.report-card {
  background: var(--color-bg-default);
  border-radius: var(--radius-md);
  border: 1.5px solid var(--color-border);
  box-shadow: 0 1px 3px var(--color-shadow);
  overflow: hidden;
}
.report-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px var(--space-5); cursor: pointer; user-select: none;
  transition: background .12s;
}
.report-header:hover { background: var(--neutral-100); }
.report-header-left { display: flex; align-items: center; gap: var(--space-3); }
.report-week-badge {
  background: var(--brand-primary); color: var(--brand-accent);
  font-family: var(--font-ui); font-size: var(--type-u4);
  font-weight: 800; letter-spacing: .8px;
  text-transform: uppercase;
  padding: 4px 10px; border-radius: var(--radius-sm);
}
.report-date {
  font-family: var(--font-ui);
  font-size: var(--type-u3); font-weight: 500;
  color: var(--color-text-subtle);
}
.report-chevron { font-size: 11px; color: var(--color-text-subtle); transition: transform .18s; }
.report-header.open .report-chevron { transform: rotate(180deg); }
.report-body { display: none; padding: 0 var(--space-5) var(--space-5); border-top: 1.5px solid var(--neutral-200); }
.report-body.open { display: block; }
.report-section { margin-top: var(--space-4); }
.report-section h4 {
  font-family: var(--font-ui);
  font-size: var(--type-u4); font-weight: 800;
  text-transform: uppercase; letter-spacing: .6px;
  color: var(--color-text-subtle); margin-bottom: var(--space-2);
}
.report-section p, .report-section li {
  font-family: var(--font-body);
  font-size: var(--type-para-sm); line-height: var(--type-para-sm-lh);
  color: var(--color-text-secondary);
}
.report-section ul { padding-left: 18px; }
.report-section li { margin-bottom: 3px; }

.rag-grid { display: grid; grid-template-columns: repeat(3, 82px); gap: var(--space-2); }
.rag-box { border-radius: var(--radius-sm); padding: 8px 12px; border-left: 3px solid; }
.rag-box.green  { background: #e5f5e7; border-color: var(--color-success); }
.rag-box.yellow { background: #fff4e0; border-color: var(--color-warning); }
.rag-box.red    { background: #fce9e9; border-color: var(--color-danger); }
.rag-label {
  font-family: var(--font-ui); font-size: 9px; font-weight: 800;
  text-transform: uppercase; letter-spacing: .5px; opacity: .7; margin-bottom: 2px;
}
.rag-count { font-family: var(--font-headline); font-size: 20px; font-weight: 800; line-height: 1; }
.rag-box.green  .rag-count { color: #0c6b17; }
.rag-box.yellow .rag-count { color: var(--color-warning); }
.rag-box.red    .rag-count { color: var(--color-danger); }

/* ═══════════════════════════════════════════════════════════════
   NEWS FEED
═══════════════════════════════════════════════════════════════ */
.news-layout {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: var(--space-6); align-items: start;
}
@media (max-width: 900px) { .news-layout { grid-template-columns: 1fr; } }

.news-feed { display: flex; flex-direction: column; }
.news-item {
  display: flex; gap: var(--space-4);
  padding: var(--space-4) 0;
  border-bottom: 1px solid var(--neutral-200);
  align-items: flex-start;
}
.news-item:last-child { border-bottom: none; }

.news-dot-col { display: flex; flex-direction: column; align-items: center; padding-top: 3px; }
.news-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  border: 2px solid var(--color-bg-default);
  box-shadow: 0 0 0 2px currentColor;
}
.news-dot.update    { color: var(--neutral-700);      background: var(--neutral-700); }
.news-dot.milestone { color: var(--color-success);    background: var(--color-success); }
.news-dot.risk      { color: var(--color-warning);    background: var(--color-warning); }
.news-dot.blocker   { color: var(--color-danger);     background: var(--color-danger); }
.news-line { width: 1.5px; flex: 1; background: var(--neutral-300); margin-top: 4px; min-height: 16px; }

.news-content { flex: 1; }
.news-meta { display: flex; align-items: center; gap: var(--space-2); margin-bottom: 3px; flex-wrap: wrap; }
.news-tag {
  font-family: var(--font-ui); font-size: 9px; font-weight: 800;
  text-transform: uppercase; letter-spacing: .5px;
  padding: 2px 7px; border-radius: 2px;
}
.news-tag.update    { background: var(--neutral-200); color: var(--neutral-700); }
.news-tag.milestone { background: #e5f5e7; color: #0c6b17; }
.news-tag.risk      { background: #fff4e0; color: var(--color-warning); }
.news-tag.blocker   { background: #fce9e9; color: var(--color-danger); }

.news-date, .news-author {
  font-family: var(--font-ui); font-size: var(--type-u4); color: var(--color-text-subtle);
}
.news-headline {
  font-family: var(--font-ui); font-size: var(--type-u1);
  font-weight: 700; color: var(--color-text-default); margin-bottom: 3px;
}
.news-body {
  font-family: var(--font-body); font-size: var(--type-para-sm);
  line-height: var(--type-para-sm-lh); color: var(--color-text-secondary);
}
.news-delete, .news-edit {
  background: none; border: none; cursor: pointer;
  color: var(--color-border-strong); font-size: 12px;
  padding: 2px 4px; border-radius: 3px; line-height: 1;
}
.news-delete:hover { color: var(--color-danger); background: #fce9e9; }
.news-edit:hover   { color: var(--color-info);   background: #dbeeff; }

/* Add panel */
.news-add-panel {
  background: var(--color-bg-default);
  border-radius: var(--radius-md);
  border: 1.5px solid var(--color-border);
  padding: var(--space-5);
  box-shadow: 0 1px 3px var(--color-shadow);
  position: sticky; top: 120px;
}
.news-add-panel h3 {
  font-family: var(--font-headline);
  font-size: var(--type-h8-size); font-weight: var(--type-h8-weight);
  line-height: var(--type-h8-lh);
  margin-bottom: var(--space-4);
}

/* ═══════════════════════════════════════════════════════════════
   WIKI
═══════════════════════════════════════════════════════════════ */
.wiki-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: var(--space-4);
}
.wiki-category {
  background: var(--color-bg-default);
  border-radius: var(--radius-md);
  border: 1.5px solid var(--color-border);
  box-shadow: 0 1px 3px var(--color-shadow);
  overflow: hidden;
}
.wiki-cat-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-3) var(--space-4);
  background: var(--neutral-100);
  border-bottom: 1.5px solid var(--color-border);
}
.wiki-cat-title {
  display: flex; align-items: center; gap: var(--space-2);
  font-family: var(--font-ui);
  font-size: var(--type-u3); font-weight: 800;
  text-transform: uppercase; letter-spacing: .5px;
  color: var(--color-text-default);
}
.wiki-cat-icon { font-size: 15px; }
.wiki-cat-actions { display: flex; gap: 4px; }
.wiki-cat-actions button {
  background: none; border: none; cursor: pointer;
  font-size: 16px; line-height: 1; padding: 2px 5px;
  border-radius: var(--radius-sm); color: var(--color-text-subtle);
}
.wiki-cat-actions button:hover { background: var(--neutral-200); }
.wiki-links { padding: var(--space-2) 0; }
.wiki-link-item {
  display: flex; align-items: flex-start; gap: var(--space-2);
  padding: 8px var(--space-4); transition: background .12s; position: relative;
}
.wiki-link-item:hover { background: var(--neutral-100); }
.wiki-link-item a {
  flex: 1; text-decoration: none; color: var(--color-text-default);
  font-family: var(--font-ui); font-size: var(--type-u2); font-weight: 600;
  display: flex; align-items: flex-start; gap: var(--space-2);
}
.wiki-link-item a:hover { color: var(--brand-primary); text-decoration: underline; }
.wiki-doc-icon { font-size: 13px; opacity: .6; margin-top: 1px; flex-shrink: 0; }
.wiki-link-info .wiki-link-desc {
  font-family: var(--font-ui); font-size: var(--type-u4);
  color: var(--color-text-subtle); margin-top: 1px;
}
.del-wiki {
  display: none; background: none; border: none; cursor: pointer;
  color: var(--color-danger); font-size: 11px; padding: 2px 4px; flex-shrink: 0;
}
.wiki-link-item:hover .del-wiki { display: block; }
.empty-wiki {
  padding: var(--space-4);
  font-family: var(--font-ui); font-size: var(--type-u3);
  color: var(--color-text-subtle); font-style: italic;
}

/* ═══════════════════════════════════════════════════════════════
   FORMS & MODALS
═══════════════════════════════════════════════════════════════ */
.modal-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.45); z-index: 1000;
  align-items: center; justify-content: center;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: var(--color-bg-default);
  border-radius: var(--radius-lg); padding: var(--space-6);
  width: 480px; max-width: 95vw;
  box-shadow: 0 24px 64px rgba(0,0,0,.25);
}
.modal h3 {
  font-family: var(--font-headline);
  font-size: var(--type-h7-size); font-weight: var(--type-h7-weight);
  line-height: var(--type-h7-lh);
  margin-bottom: var(--space-5);
}

.form-group { margin-bottom: var(--space-3); }
.form-group label {
  display: block;
  font-family: var(--font-ui); font-size: var(--type-u4); font-weight: 700;
  text-transform: uppercase; letter-spacing: .4px;
  color: var(--color-text-subtle); margin-bottom: 5px;
}
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-sm); padding: 8px var(--space-3);
  font-family: var(--font-ui); font-size: var(--type-u2);
  color: var(--color-text-default); background: var(--color-bg-default);
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none; border-color: var(--brand-primary);
  box-shadow: 0 0 0 3px var(--brand-primary-highlight);
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); }
.modal-footer { display: flex; justify-content: flex-end; gap: var(--space-2); margin-top: var(--space-5); }

input[type=color] {
  width: 40px; height: 36px;
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-sm); cursor: pointer; padding: 2px;
}

/* ─── Divider ─── */
hr { border: none; border-top: 1.5px solid var(--color-border); margin: var(--space-4) 0; }

/* ═══════════════════════════════════════════════════════════════
   PROJECT STATUS CARDS
═══════════════════════════════════════════════════════════════ */
.ps-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: var(--space-4);
}
.ps-card {
  background: var(--color-bg-default);
  border-radius: var(--radius-md);
  border: 1.5px solid var(--color-border);
  box-shadow: 0 1px 3px var(--color-shadow);
  overflow: hidden;
}
.ps-card-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: var(--space-4) var(--space-5) var(--space-3);
  border-bottom: 1.5px solid var(--color-border);
  cursor: pointer; user-select: none; transition: background .12s;
}
.ps-card-header:hover { background: var(--neutral-100); }
.ps-chevron {
  font-size: 11px; color: var(--color-text-subtle); margin-left: var(--space-2);
  transition: transform .2s; flex-shrink: 0; margin-top: 4px;
}
.ps-card-header.open .ps-chevron { transform: rotate(180deg); }
.ps-card-title-block { flex: 1; }
.ps-card-name {
  font-family: var(--font-headline);
  font-size: var(--type-h8-size); font-weight: var(--type-h8-weight);
  line-height: var(--type-h8-lh); color: var(--color-text-default);
  margin-bottom: 3px;
}
.ps-card-meta {
  font-family: var(--font-ui); font-size: var(--type-u4);
  color: var(--color-text-subtle); display: flex; gap: var(--space-3);
}
.ps-card-body { padding: var(--space-4) var(--space-5); display: none; }
.ps-card-body.open { display: block; }
.ps-section { margin-bottom: var(--space-3); }
.ps-section:last-child { margin-bottom: 0; }
.ps-section-label {
  font-family: var(--font-ui); font-size: 9px; font-weight: 800;
  text-transform: uppercase; letter-spacing: .6px; color: var(--color-text-subtle);
  margin-bottom: 4px;
}
.ps-section-body {
  font-family: var(--font-body); font-size: 13px; line-height: 1.65;
  color: var(--color-text-secondary);
}
.ps-section-body.risk { color: var(--color-warning); }
.ps-section-body.blocker { color: var(--color-danger); }
.ps-actions { display: flex; flex-direction: column; gap: 5px; }
.ps-action-item {
  display: flex; align-items: baseline; gap: var(--space-2);
  font-family: var(--font-ui); font-size: var(--type-u3);
}
.ps-action-owner {
  flex-shrink: 0; font-weight: 700; color: var(--color-text-default);
  min-width: 90px;
}
.ps-action-desc { color: var(--color-text-secondary); }
.ps-tag {
  display: inline-flex; align-items: center;
  font-family: var(--font-ui); font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .4px;
  padding: 2px 7px; border-radius: 2px; margin-left: 4px;
}
.ps-tag.dep { background: #e8edf7; color: #1a4a8a; }
.ps-card-footer {
  padding: var(--space-3) var(--space-5);
  border-top: 1px solid var(--neutral-200);
  display: flex; gap: var(--space-2); flex-wrap: wrap;
}
.ps-link {
  font-family: var(--font-ui); font-size: var(--type-u4); font-weight: 600;
  color: var(--color-text-default); text-decoration: none;
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 3px; background: var(--neutral-100);
  border: 1px solid var(--color-border);
}
.ps-link:hover { background: var(--neutral-200); }

/* ═══════════════════════════════════════════════════════════════
   PROGRAM STATUS — Doc-style report format
═══════════════════════════════════════════════════════════════ */
.report-doc {
  background: var(--color-bg-default);
  border-radius: var(--radius-md);
  border: 1.5px solid var(--color-border);
  box-shadow: 0 1px 3px var(--color-shadow);
  overflow: hidden;
  margin-bottom: var(--space-3);
}
.report-doc-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px var(--space-5); cursor: pointer; user-select: none;
  transition: background .12s;
}
.report-doc-header:hover { background: var(--neutral-100); }
.report-doc-header.open { border-bottom: 1.5px solid var(--color-border); }
.report-doc-meta { display: flex; align-items: center; gap: var(--space-3); }
.report-doc-body { display: none; }
.report-doc-body.open { display: block; }

/* Doc sections */
.rdoc-banner {
  background: var(--brand-primary); color: white;
  padding: var(--space-4) var(--space-5);
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: var(--space-4);
}
.rdoc-banner-title {
  font-family: var(--font-headline); font-size: var(--type-h7-size);
  font-weight: 800; line-height: 1.2;
}
.rdoc-banner-meta {
  font-family: var(--font-ui); font-size: var(--type-u3); opacity: .7;
  margin-top: 2px;
}
.rdoc-rag-row {
  display: flex; gap: var(--space-3); padding: var(--space-4) var(--space-5);
  border-bottom: 1.5px solid var(--color-border); background: var(--neutral-100);
  flex-wrap: wrap;
}
.rdoc-rag-box {
  display: flex; align-items: center; gap: var(--space-2);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-sm); border-left: 3px solid;
  flex: 1; min-width: 100px;
}
.rdoc-rag-box.green  { background: #e5f5e7; border-color: var(--color-success); }
.rdoc-rag-box.yellow { background: #fff4e0; border-color: var(--color-warning); }
.rdoc-rag-box.red    { background: #fce9e9; border-color: var(--color-danger); }
.rdoc-rag-num {
  font-family: var(--font-headline); font-size: 22px; font-weight: 800; line-height: 1;
}
.rdoc-rag-box.green  .rdoc-rag-num { color: #0c6b17; }
.rdoc-rag-box.yellow .rdoc-rag-num { color: var(--color-warning); }
.rdoc-rag-box.red    .rdoc-rag-num { color: var(--color-danger); }
.rdoc-rag-label {
  font-family: var(--font-ui); font-size: var(--type-u4); font-weight: 700;
  text-transform: uppercase; letter-spacing: .4px; opacity: .7;
}

.rdoc-sections { padding: var(--space-5); display: flex; flex-direction: column; gap: var(--space-5); }
.rdoc-section {}
.rdoc-section-title {
  font-family: var(--font-ui); font-size: var(--type-u3); font-weight: 800;
  text-transform: uppercase; letter-spacing: .6px; color: var(--color-text-subtle);
  border-bottom: 1.5px solid var(--color-border); padding-bottom: var(--space-2);
  margin-bottom: var(--space-3); display: flex; align-items: center; gap: var(--space-2);
}
.rdoc-section p {
  font-family: var(--font-body); font-size: 14px; line-height: 1.75;
  color: var(--color-text-secondary);
}
.rdoc-section.risk-section p { color: var(--color-warning); }

/* Action items table */
.rdoc-action-table { width: 100%; border-collapse: collapse; }
.rdoc-action-table th {
  font-family: var(--font-ui); font-size: 9px; font-weight: 800;
  text-transform: uppercase; letter-spacing: .5px; color: var(--color-text-subtle);
  background: var(--neutral-100); padding: 8px 12px;
  border-bottom: 1.5px solid var(--color-border); text-align: left;
}
.rdoc-action-table td {
  font-family: var(--font-ui); font-size: var(--type-u3);
  padding: 9px 12px; border-bottom: 1px solid var(--neutral-200);
  vertical-align: top;
}
.rdoc-action-table tr:last-child td { border-bottom: none; }
.rdoc-action-table tr:hover td { background: var(--neutral-100); }
.ai-owner { font-weight: 700; color: var(--color-text-default); white-space: nowrap; }
.ai-task { color: var(--color-text-secondary); }
.ai-due { color: var(--color-text-subtle); white-space: nowrap; font-size: var(--type-u4); }
.rdoc-footer {
  padding: var(--space-3) var(--space-5);
  border-top: 1.5px solid var(--color-border);
  background: var(--neutral-100);
  display: flex; gap: var(--space-2);
}

/* ── Overall Project Status table ── */
.rdoc-status-table { width:100%; border-collapse: collapse; }
.rdoc-status-table th {
  font-family: var(--font-headline); font-size: 14px; font-weight: 700;
  text-align: center; padding: 16px 12px; border: 1.5px solid var(--color-border);
}
.rdoc-status-th-green  { background: #e5f5e7; color: #0c6b17; }
.rdoc-status-th-yellow { background: #fff4e0; color: #a05000; }
.rdoc-status-th-red    { background: #fce9e9; color: #b52020; }

/* ── Milestone Tracker & Issues tables (shared base) ── */
.rdoc-milestone-table,
.rdoc-issues-table { width:100%; border-collapse: collapse; }
.rdoc-milestone-table th,
.rdoc-issues-table th {
  font-family: var(--font-ui); font-size: 9px; font-weight: 800;
  text-transform: uppercase; letter-spacing: .5px; color: var(--color-text-subtle);
  background: var(--neutral-100); padding: 8px 12px;
  border-bottom: 1.5px solid var(--color-border); text-align: left;
}
.rdoc-milestone-table td,
.rdoc-issues-table td {
  font-family: var(--font-ui); font-size: var(--type-u3);
  padding: 9px 12px; border-bottom: 1px solid var(--neutral-200); vertical-align: top;
}
.rdoc-milestone-table tr:last-child td,
.rdoc-issues-table tr:last-child td { border-bottom: none; }
.rdoc-milestone-table tr:hover td,
.rdoc-issues-table tr:hover td { background: var(--neutral-100); }
.rdoc-ms-name { font-weight: 700; color: var(--color-text-default); }
.rdoc-ms-date { color: var(--color-text-subtle); white-space: nowrap; }
.rdoc-ms-desc { color: var(--color-text-secondary); }
.ms-badge {
  display: inline-block; font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 99px; white-space: nowrap;
}
.ms-badge.upcoming    { background: #dbeeff; color: #0064b0; }
.ms-badge.not-started { background: var(--neutral-200); color: var(--color-text-subtle); }
.ms-badge.in-progress { background: #fff4e0; color: #a05000; }
.ms-badge.complete    { background: #e5f5e7; color: #0c6b17; }
.ms-badge.delayed     { background: #fce9e9; color: #b52020; }
.rdoc-priority { font-weight: 700; white-space: nowrap; }
.rdoc-priority.high   { color: #b52020; }
.rdoc-priority.medium { color: #a05000; }
.rdoc-priority.low    { color: var(--color-text-subtle); }

/* ── Gantt task popup ── */
.gantt-popup {
  position: fixed; z-index: 300;
  background: var(--color-bg-default);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-md);
  box-shadow: 0 8px 32px rgba(0,0,0,.18);
  width: 360px; max-width: 92vw;
  display: none;
}
.gantt-popup.open { display: block; }
.gantt-popup-header {
  background: var(--brand-primary); color: white;
  padding: 12px 16px; border-radius: var(--radius-md) var(--radius-md) 0 0;
  display: flex; align-items: center; justify-content: space-between;
}
.gantt-popup-title { font-family: var(--font-headline); font-size: 15px; font-weight: 800; }
.gantt-popup-close {
  background: none; border: none; color: rgba(255,255,255,.7); cursor: pointer;
  font-size: 18px; line-height: 1; padding: 0 2px;
}
.gantt-popup-close:hover { color: white; }
.gantt-popup-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; max-height: 60vh; overflow-y: auto; }
.gantt-popup-section-title {
  font-family: var(--font-ui); font-size: 9px; font-weight: 800;
  text-transform: uppercase; letter-spacing: .6px; color: var(--color-text-subtle);
  border-bottom: 1px solid var(--color-border); padding-bottom: 4px; margin-bottom: 4px;
}
.gantt-popup-text {
  font-family: var(--font-body); font-size: 13px; line-height: 1.6; color: var(--color-text-secondary);
}
.gantt-popup-links { display: flex; gap: 6px; flex-wrap: wrap; }

/* ── Bullet list (accomplishments, plan, decisions) ── */
.rdoc-bullet-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px; }
.rdoc-bullet-list li {
  font-family: var(--font-body); font-size: 14px; line-height: 1.75;
  color: var(--color-text-secondary); display: flex; gap: var(--space-2);
}
.rdoc-bullet-list li::before {
  content: '•'; color: var(--brand-accent); font-weight: 900; flex-shrink: 0; margin-top: 1px;
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header class="site-header">
  <div class="logo">
    <span class="badge">OXP</span>
    <h1>Project Hub</h1>
  </div>
  <div class="header-meta">Last updated: <span id="last-updated"></span></div>
</header>

<!-- ═══ NAV ═══ -->
<nav class="nav-tabs">
  <button class="nav-tab active" data-tab="news">
    <span class="icon">📣</span> News Feed
  </button>
  <button class="nav-tab" data-tab="status">
    <span class="icon">📋</span> Program Status
  </button>
  <button class="nav-tab" data-tab="project-status">
    <span class="icon">🟢</span> Project Status
  </button>
  <button class="nav-tab" data-tab="gantt">
    <span class="icon">📅</span> Timeline
  </button>
  <button class="nav-tab" data-tab="wiki">
    <span class="icon">📚</span> Wiki
  </button>
</nav>

<!-- ═══════════════════════════════════════
     TAB 1 — NEWS FEED (now first/default)
═══════════════════════════════════════ -->
<section class="section active" id="tab-news">
  <div class="section-header">
    <span class="section-title">Project Updates</span>
  </div>
  <div class="news-layout">
    <div class="card" style="padding: var(--space-5);">
      <div class="news-feed" id="news-feed"></div>
    </div>
    <div class="news-add-panel">
      <h3>Post an Update</h3>
      <div class="form-group">
        <label>Headline</label>
        <input type="text" id="news-headline" placeholder="Brief summary…" />
      </div>
      <div class="form-group">
        <label>Detail</label>
        <textarea id="news-detail" rows="3" placeholder="More context (optional)"></textarea>
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="news-type">
          <option value="update">Update</option>
          <option value="milestone">Milestone</option>
          <option value="risk">Risk</option>
          <option value="blocker">Blocker</option>
        </select>
      </div>
      <div class="form-group">
        <label>Author</label>
        <input type="text" id="news-author" placeholder="Your name" />
      </div>
      <button class="btn" style="width:100%;justify-content:center;" id="post-news">Post Update</button>
    </div>
  </div>
</section>

<!-- ═══════════════════════════════════════
     TAB 2 — TIMELINE
═══════════════════════════════════════ -->
<section class="section" id="tab-gantt">
  <div class="section-header">
    <span class="section-title">Project Timeline</span>
    <div class="btn-group">
      <button class="btn secondary" id="gantt-zoom-out">− Zoom Out</button>
      <button class="btn secondary" id="gantt-zoom-in">+ Zoom In</button>
      <button class="btn" id="open-add-task">＋ Add Task</button>
    </div>
  </div>
  <div id="gantt-container"></div>
</section>

<!-- ═══════════════════════════════════════
     TAB 3 — PROJECT STATUS
═══════════════════════════════════════ -->
<section class="section" id="tab-project-status">
  <div class="section-header">
    <span class="section-title">Project Status</span>
    <span style="font-family:var(--font-ui);font-size:var(--type-u3);color:var(--color-text-subtle);">Pulled from active notes · Updated Mar 26, 2026</span>
  </div>
  <div class="ps-grid" id="ps-grid"></div>
</section>

<!-- ═══════════════════════════════════════
     TAB 4 — PROGRAM STATUS
═══════════════════════════════════════ -->
<section class="section" id="tab-status">
  <div class="section-header">
    <span class="section-title">Program Status</span>
    <button class="btn" id="open-add-report">＋ Add Report</button>
  </div>
  <div class="report-list" id="report-list"></div>
</section>

<!-- ═══════════════════════════════════════
     TAB 5 — WIKI
═══════════════════════════════════════ -->
<section class="section" id="tab-wiki">
  <div class="section-header">
    <span class="section-title">Project Wiki & Documents</span>
    <button class="btn" id="open-add-category">＋ Add Category</button>
  </div>
  <div class="wiki-grid" id="wiki-grid"></div>
</section>

<!-- ═══════════════════════════════════════
     MODALS
═══════════════════════════════════════ -->

<!-- Add Task -->
<div class="modal-backdrop" id="modal-task">
  <div class="modal">
    <h3>Add Timeline Task</h3>
    <div class="form-group">
      <label>Task Name</label>
      <input type="text" id="task-name" placeholder="e.g. Discovery Phase" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Start Date</label>
        <input type="date" id="task-start" />
      </div>
      <div class="form-group">
        <label>End Date</label>
        <input type="date" id="task-end" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Owner</label>
        <input type="text" id="task-owner" placeholder="Name or team" />
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="task-status">
          <option value="not-started">Not Started</option>
          <option value="on-track">On Track</option>
          <option value="at-risk">At Risk</option>
          <option value="delayed">Delayed</option>
          <option value="complete">Complete</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Bar Color</label>
        <input type="color" id="task-color" value="#000000" />
      </div>
      <div class="form-group">
        <label>Group / Phase</label>
        <input type="text" id="task-group" placeholder="e.g. Phase 1" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn secondary" id="close-task-modal">Cancel</button>
      <button class="btn" id="save-task">Save Task</button>
    </div>
  </div>
</div>

<!-- Add Report -->
<div class="modal-backdrop" id="modal-report">
  <div class="modal">
    <h3>Add Status Report</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Week Number</label>
        <input type="number" id="rpt-week" placeholder="e.g. 14" min="1" />
      </div>
      <div class="form-group">
        <label>Report Date</label>
        <input type="date" id="rpt-date" />
      </div>
    </div>
    <div class="form-group">
      <label>Accomplishments</label>
      <textarea id="rpt-wins" rows="3" placeholder="What was completed this week?"></textarea>
    </div>
    <div class="form-group">
      <label>In Progress</label>
      <textarea id="rpt-wip" rows="2" placeholder="What is actively being worked on?"></textarea>
    </div>
    <div class="form-group">
      <label>Upcoming</label>
      <textarea id="rpt-upcoming" rows="2" placeholder="What's planned for next week?"></textarea>
    </div>
    <div class="form-group">
      <label>Risks / Issues</label>
      <textarea id="rpt-risks" rows="2" placeholder="Any blockers or concerns?"></textarea>
    </div>
    <div class="form-row" style="grid-template-columns:1fr 1fr 1fr">
      <div class="form-group">
        <label>On Track</label>
        <input type="number" id="rpt-green" value="0" min="0" />
      </div>
      <div class="form-group">
        <label>At Risk</label>
        <input type="number" id="rpt-yellow" value="0" min="0" />
      </div>
      <div class="form-group">
        <label>Delayed</label>
        <input type="number" id="rpt-red" value="0" min="0" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn secondary" id="close-report-modal">Cancel</button>
      <button class="btn" id="save-report">Save Report</button>
    </div>
  </div>
</div>

<!-- Add Wiki Link -->
<div class="modal-backdrop" id="modal-wiki-link">
  <div class="modal">
    <h3>Add Document Link</h3>
    <input type="hidden" id="wiki-cat-id" />
    <div class="form-group">
      <label>Document Name</label>
      <input type="text" id="wiki-link-name" placeholder="e.g. Project Charter" />
    </div>
    <div class="form-group">

/* ────────────────────────────────────────────────
   GANTT
──────────────────────────────────────────────── */
let ganttZoom = 1.0;
const BASE_PPD = 8; // pixels per day base

function pxPerDay() { return BASE_PPD * ganttZoom; }

function timelineBounds() {
  const starts = tasks.map(t => parseDate(t.start));
  const ends   = tasks.map(t => parseDate(t.end));
  let min = new Date(Math.min(...starts));
  let max = new Date(Math.max(...ends));
  min.setDate(min.getDate() - 7);
  max.setDate(max.getDate() + 14);
  return { min, max };
}

function daysBetween(a, b) { return Math.round((b - a) / 86400000); }

function renderGantt() {
  const container = document.getElementById('gantt-container');
  if (!tasks.length) {
    container.innerHTML = '<p style="padding:24px;color:var(--color-text-subtle);">No tasks yet. Click "Add Task" to get started.</p>';
    return;
  }

  const { min: tStart, max: tEnd } = timelineBounds();
  const totalDays  = daysBetween(tStart, tEnd);
  const ppd        = pxPerDay();
  const totalWidth = totalDays * ppd;

  // Month headers
  let monthHtml = '';
  let cur = new Date(tStart); cur.setDate(1);
  while (cur <= tEnd) {
    const mStart = new Date(Math.max(cur, tStart));
    const nextM  = new Date(cur.getFullYear(), cur.getMonth() + 1, 1);
    const mEnd   = new Date(Math.min(nextM, tEnd));
    const w = daysBetween(mStart, mEnd) * ppd;
    const label = cur.toLocaleDateString('en-US', { month:'short', year:'2-digit' });
    monthHtml += `<div class="timeline-month" style="width:${w}px">${label}</div>`;
    cur = nextM;
  }

  // Today marker offset
  const todayOffset = daysBetween(tStart, today);
  const todayPx = todayOffset * ppd;

  // Sort & group tasks — explicit group order
  const GROUP_ORDER = ['MVP Features', 'P1 Scope', 'Ongoing', 'Client Onboarding'];
  const sorted = [...tasks].sort((a, b) => {
    const ga = GROUP_ORDER.indexOf(a.group); const gb = GROUP_ORDER.indexOf(b.group);
    const oa = ga === -1 ? 99 : ga;          const ob = gb === -1 ? 99 : gb;
    if (oa !== ob) return oa - ob;
    return a.start.localeCompare(b.start);
  });

  let rows = '';
  let lastGroup = null;
  const statusLabels = { 'on-track':'On Track','at-risk':'At Risk','delayed':'Delayed','complete':'Complete','not-started':'Not Started' };

  sorted.forEach(task => {
    if (task.group && task.group !== lastGroup) {
      rows += `<tr class="group-row"><td colspan="4">${task.group}</td><td style="background:#fafafa;"></td></tr>`;
      lastGroup = task.group;
    }
    const offsetDays = daysBetween(tStart, parseDate(task.start));
    const barDays    = Math.max(1, daysBetween(parseDate(task.start), parseDate(task.end)));
    const left  = offsetDays * ppd;
    const width = Math.max(barDays * ppd, 16);

    rows += `
    <tr data-task-id="${task.id}">
      <td class="gantt-label-col" title="${task.name}" style="font-weight:600">${task.name}</td>
      <td class="gantt-owner-col" style="color:var(--color-text-subtle)">${task.owner || ''}</td>
      <td class="gantt-status-col"><span class="status-badge ${task.status}">${statusLabels[task.status] || task.status}</span></td>
      <td class="gantt-actions"><button title="Delete" onclick="deleteTask(${task.id})">🗑</button></td>
      <td class="gantt-timeline-col">
        <div class="gantt-bar-cell" style="width:${totalWidth}px">
          ${todayPx > 0 && todayPx < totalWidth ? `<div style="position:absolute;left:${todayPx}px;top:0;bottom:0;width:1.5px;background:var(--brand-accent);z-index:2;pointer-events:none"></div>` : ''}
          <div class="gantt-bar" data-task-id="${task.id}"
            style="left:${left}px;width:${width}px;background:${task.color || '#000'}"
            title="${task.name}: ${task.start} → ${task.end}">
            <span style="padding:0 8px;overflow:hidden;text-overflow:ellipsis;pointer-events:none;font-size:11px">${task.name}</span>
            <div class="resize-handle" data-resize="${task.id}"></div>
          </div>
        </div>
      </td>
    </tr>`;
  });

  container.innerHTML = `
    <div class="gantt-wrap">
      <table class="gantt-table">
        <thead>
          <tr>
            <th class="gantt-label-col">Task</th>
            <th class="gantt-owner-col">Owner</th>
            <th class="gantt-status-col">Status</th>
            <th style="width:40px"></th>
            <th class="gantt-timeline-col" style="padding:0">
              <div class="timeline-header">${monthHtml}</div>
            </th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  initDrag();
}

function initDrag() {
  // Drag bars + click-to-popup
  $$('.gantt-bar').forEach(bar => {
    bar.addEventListener('mousedown', e => {
      if (e.target.dataset.resize) return;
      e.preventDefault();
      const taskId = +bar.dataset.taskId;
      const task = tasks.find(t => t.id === taskId);
      const startX = e.clientX; const startY = e.clientY;
      const origLeft = parseInt(bar.style.left);
      bar.classList.add('dragging');
      const ppd = pxPerDay();
      let moved = false;

      const onMove = ev => {
        if (Math.abs(ev.clientX - startX) > 4 || Math.abs(ev.clientY - startY) > 4) moved = true;
        const dx = ev.clientX - startX;
        const newLeft = Math.max(0, origLeft + dx);
        bar.style.left = newLeft + 'px';
        const { min } = timelineBounds();
        const dayOff = Math.round(newLeft / ppd);
        const ns = new Date(min); ns.setDate(ns.getDate() + dayOff);
        const dur = daysBetween(parseDate(task.start), parseDate(task.end));
        const ne = new Date(ns); ne.setDate(ne.getDate() + dur);
        task.start = dateStr(ns); task.end = dateStr(ne);
        bar.title = `${task.name}: ${task.start} → ${task.end}`;
      };
      const onUp = ev => {
        bar.classList.remove('dragging');
        if (!moved) showGanttPopup(taskId, ev.clientX, ev.clientY);
        else save('oxp_tasks', tasks);
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });

  // Resize handles
  $$('.resize-handle').forEach(handle => {
    handle.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      const taskId = +handle.dataset.resize;
      const task = tasks.find(t => t.id === taskId);
      const bar = handle.parentElement;
      const startX = e.clientX;
      const origW  = parseInt(bar.style.width);
      const ppd    = pxPerDay();
      bar.classList.add('dragging');

      const onMove = ev => {
        const newW = Math.max(ppd, origW + ev.clientX - startX);
        bar.style.width = newW + 'px';
        const dur = Math.max(1, Math.round(newW / ppd));
        const ne = new Date(parseDate(task.start));
        ne.setDate(ne.getDate() + dur);
        task.end = dateStr(ne);
        bar.title = `${task.name}: ${task.start} → ${task.end}`;
      };
      const onUp = () => {
        bar.classList.remove('dragging');
        save('oxp_tasks', tasks);
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

    return `<span class="ms-badge ${s}">${map[s] || s}</span>`;
  };
  const priorityClass = p => (p||'').toLowerCase() === 'high' ? 'high' : (p||'').toLowerCase() === 'medium' ? 'medium' : 'low';
  const bulletList = arr => Array.isArray(arr)
    ? `<ul class="rdoc-bullet-list">${arr.map(item => `<li>${item}</li>`).join('')}</ul>`
    : `<ul class="rdoc-bullet-list"><li>${arr}</li></ul>`;

  list.innerHTML = sorted.map(r => {
    const weekLabel = r.weekRange || (r.date ? parseDate(r.date).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) : `Week ${r.week}`);
    const author = r.author || 'K. Davis';

    // Overall status table
    const statusHtml = `

        <table class="rdoc-status-table">
          <tr>
            <th class="rdoc-status-th-green">✓&nbsp; On Track &nbsp;(${r.green||0})</th>
            <th class="rdoc-status-th-yellow">⚠&nbsp; At Risk &nbsp;(${r.yellow||0})</th>
            <th class="rdoc-status-th-red">✗&nbsp; Off Track &nbsp;(${r.red||0})</th>
          </tr>
        </table>
      </div>`;

    // Executive summary
    const summaryHtml = r.summary ? `
      <div class="rdoc-section">
        <div class="rdoc-section-title">Executive Summary</div>
        <p style="font-family:var(--font-body);font-size:14px;line-height:1.75;color:var(--color-text-secondary);">${r.summary}</p>
      </div>` : '';

    // Milestone tracker
    const milestoneHtml = (r.milestones && r.milestones.length) ? `
      <div class="rdoc-section">
        <div class="rdoc-section-title">Milestone Tracker</div>
        <table class="rdoc-milestone-table">
          <thead><tr><th>Milestone</th><th>Target Date</th><th>Status</th><th>Description</th></tr></thead>
          <tbody>${r.milestones.map(m => `
            <tr>
              <td class="rdoc-ms-name">${m.name}</td>
              <td class="rdoc-ms-date">${m.target}</td>
              <td>${msBadge(m.status)}</td>
              <td class="rdoc-ms-desc">${m.desc||''}</td>
            </tr>`).join('')}
          </tbody>
        </table>

    // Last week accomplishments
    const winsHtml = r.wins ? `
      <div class="rdoc-section">
        <div class="rdoc-section-title">Last Week — Accomplishments</div>
        ${bulletList(r.wins)}
      </div>` : '';

    // This week plan
    const upcomingHtml = r.upcoming ? `
      <div class="rdoc-section">
        <div class="rdoc-section-title">This Week — Plan</div>
        ${bulletList(r.upcoming)}
      </div>` : '';

    // Issues, blockers & risks
    const issuesHtml = (r.actions && r.actions.length) ? `
      <div class="rdoc-section">
        <div class="rdoc-section-title">Issues, Blockers &amp; Risks</div>
        <table class="rdoc-issues-table">
          <thead><tr><th>Issue / Blocker</th><th>Priority</th><th>Owner</th><th>Status</th><th>Resolution / ETA</th></tr></thead>

  }).join('');

        </div>
        ${p.blockers ? `<div class="ps-section"><div class="ps-section-label">🚧 Blockers</div><div class="ps-section-body blocker">${p.blockers}</div></div>` : ''}
        ${p.risks    ? `<div class="ps-section"><div class="ps-section-label">⚠️ Risks</div><div class="ps-section-body risk">${p.risks}</div></div>` : ''}
        ${actionsHtml}
      </div>
      ${linksHtml}
    </div>`;
  }).join('');
}

/* ────────────────────────────────────────────────
   NEWS FEED
──────────────────────────────────────────────── */
function renderNews() {
  const feed = document.getElementById('news-feed');
  if (!newsItems.length) { feed.innerHTML = '<p style="color:var(--color-text-subtle);padding:12px 0;">No updates yet.</p>'; return; }
  const sorted = [...newsItems].sort((a, b) => b.date.localeCompare(a.date));
  const typeLabels = { update:'Update', milestone:'Milestone', risk:'Risk', blocker:'Blocker' };
  feed.innerHTML = sorted.map((item, i) => `
    <div class="news-item">
      <div class="news-dot-col">
        <div class="news-dot ${item.type}"></div>
        ${i < sorted.length - 1 ? '<div class="news-line"></div>' : ''}
      </div>
      <div class="news-content">
        <div class="news-meta">
          <span class="news-tag ${item.type}">${typeLabels[item.type] || item.type}</span>
          <span class="news-date">${item.date}</span>
          ${item.author ? `<span class="news-author">· ${item.author}</span>` : ''}
          <button class="news-edit"   onclick="editNews(${item.id})" title="Edit">✏️</button>
          <button class="news-delete" onclick="deleteNews(${item.id})" title="Delete">✕</button>
        </div>
        <div class="news-headline">${item.headline}</div>
        ${item.body ? `<div class="news-body">${item.body}</div>` : ''}
      </div>
    </div>`).join('');
}

window.deleteNews = id => {
  if (!confirm('Remove this update?')) return;
  newsItems = newsItems.filter(n => n.id !== id);
  save('oxp_news', newsItems); renderNews();
};
$('#post-news').addEventListener('click', () => {
  const headline = $('#news-headline').value.trim();
  if (!headline) { alert('Headline is required.'); return; }
  newsItems.unshift({ id: nextNewsId++, type: $('#news-type').value, headline, body: $('#news-detail').value.trim(), author: $('#news-author').value.trim(), date: dateStr(today) });
  save('oxp_news', newsItems); save('oxp_next_news_id', nextNewsId);
  ['news-headline','news-detail'].forEach(id => document.getElementById(id).value = '');
  renderNews();
});

/* ────────────────────────────────────────────────
   WIKI
──────────────────────────────────────────────── */
function renderWiki() {
  const grid = document.getElementById('wiki-grid');
  if (!wikiCats.length) { grid.innerHTML = '<p style="color:var(--color-text-subtle);">No categories yet.</p>'; return; }
  grid.innerHTML = wikiCats.map(cat => `
    <div class="wiki-category">
      <div class="wiki-cat-header">
        <span class="wiki-cat-title"><span class="wiki-cat-icon">${cat.icon || '📄'}</span>${cat.name}</span>
        <div class="wiki-cat-actions">
          <button onclick="openAddWikiLink(${cat.id})" title="Add link">＋</button>
          <button onclick="deleteWikiCat(${cat.id})" title="Delete category" style="color:var(--color-danger)">×</button>
        </div>
      </div>
      <div class="wiki-links">
        ${!cat.links?.length
          ? '<div class="empty-wiki">No documents yet.</div>'
          : cat.links.map(link => `
            <div class="wiki-link-item">
              <a href="${link.url || '#'}" target="_blank" rel="noopener">
                <span class="wiki-doc-icon">📄</span>
                <div class="wiki-link-info">
                  <div>${link.name}</div>
                  ${link.desc ? `<div class="wiki-link-desc">${link.desc}</div>` : ''}
                </div>
              </a>
              <button class="del-wiki" onclick="deleteWikiLink(${cat.id},${link.id})">✕</button>
            </div>`).join('')}
      </div>
    </div>`).join('');
}

window.openAddWikiLink = catId => {
  document.getElementById('wiki-cat-id').value = catId;
  ['wiki-link-name','wiki-link-url','wiki-link-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('modal-wiki-link').classList.add('open');
};
window.deleteWikiLink = (catId, linkId) => {
  const cat = wikiCats.find(c => c.id === catId);
  if (cat) cat.links = cat.links.filter(l => l.id !== linkId);
  save('oxp_wiki', wikiCats); renderWiki();
};
window.deleteWikiCat = catId => {
  if (!confirm('Delete this category and all its links?')) return;
  wikiCats = wikiCats.filter(c => c.id !== catId);
  save('oxp_wiki', wikiCats); renderWiki();
};
$('#close-wiki-link-modal').addEventListener('click', () => document.getElementById('modal-wiki-link').classList.remove('open'));
$('#save-wiki-link').addEventListener('click', () => {
  const name = $('#wiki-link-name').value.trim();
  if (!name) { alert('Document name is required.'); return; }
  const catId = +document.getElementById('wiki-cat-id').value;
  const cat   = wikiCats.find(c => c.id === catId);
  if (!cat) return;
  cat.links.push({ id: nextWikiLinkId++, name, url: $('#wiki-link-url').value.trim() || '#', desc: $('#wiki-link-desc').value.trim() });
  save('oxp_wiki', wikiCats); save('oxp_next_wiki_link', nextWikiLinkId);
  document.getElementById('modal-wiki-link').classList.remove('open');
  renderWiki();
});
$('#open-add-category').addEventListener('click', () => document.getElementById('modal-wiki-cat').classList.add('open'));
$('#close-wiki-cat-modal').addEventListener('click', () => document.getElementById('modal-wiki-cat').classList.remove('open'));
$('#save-wiki-cat').addEventListener('click', () => {
  const name = $('#wiki-cat-name').value.trim();
  if (!name) { alert('Category name is required.'); return; }
  wikiCats.push({ id: nextWikiCatId++, name, icon: $('#wiki-cat-icon').value.trim() || '📄', links: [] });
  save('oxp_wiki', wikiCats); save('oxp_next_wiki_cat', nextWikiCatId);
  document.getElementById('modal-wiki-cat').classList.remove('open');
  ['wiki-cat-name','wiki-cat-icon'].forEach(id => document.getElementById(id).value = '');
  renderWiki();
});

// Close modals on backdrop click
$$('.modal-backdrop').forEach(bd => bd.addEventListener('click', e => { if (e.target === bd) bd.classList.remove('open'); }));

/* ────────────────────────────────────────────────
   EDIT NEWS ITEM
──────────────────────────────────────────────── */
window.editNews = id => {
  const item = newsItems.find(n => n.id === id);
  if (!item) return;
  $('#edit-news-id').value       = id;
  $('#edit-news-type').value     = item.type || 'update';
  $('#edit-news-headline').value = item.headline || '';
  $('#edit-news-body').value     = item.body || '';
  $('#edit-news-author').value   = item.author || '';
  $('#edit-news-date').value     = item.date || '';
  document.getElementById('modal-edit-news').classList.add('open');
};
$('#close-edit-news-modal').addEventListener('click', () => document.getElementById('modal-edit-news').classList.remove('open'));
$('#save-edit-news').addEventListener('click', () => {
  const id = parseInt($('#edit-news-id').value);
  const item = newsItems.find(n => n.id === id);
  if (!item) return;
  item.type     = $('#edit-news-type').value;
  item.headline = $('#edit-news-headline').value.trim();
  item.body     = $('#edit-news-body').value.trim();
  item.author   = $('#edit-news-author').value.trim();
  item.date     = $('#edit-news-date').value;
  save('oxp_news', newsItems);
  document.getElementById('modal-edit-news').classList.remove('open');
  renderNews();
});

/* ────────────────────────────────────────────────
   PROJECT STATUS CARD TOGGLE
──────────────────────────────────────────────── */
window.togglePsCard = (id, header) => {
  const body = document.getElementById('psc-' + id);
  const open = body.classList.toggle('open');
  header.classList.toggle('open', open);
};

/* ────────────────────────────────────────────────
   GANTT TASK POPUP
──────────────────────────────────────────────── */
function showGanttPopup(taskId, x, y) {
  const task   = tasks.find(t => t.id === taskId);
  if (!task) return;
  // Try to match to projectStatuses by normalising the name
  const norm  = s => s.toLowerCase().replace(/\s*\(p1\)/,'').replace(/\s*\(.*?\)/,'').trim();
  const ps    = projectStatuses.find(p => norm(p.name) === norm(task.name));
  const popup  = document.getElementById('gantt-popup');
  const title  = document.getElementById('gantt-popup-title');
  const body   = document.getElementById('gantt-popup-body');
  const statusLabels = { 'on-track':'On Track','at-risk':'At Risk','delayed':'Delayed','complete':'Complete','not-started':'Not Started' };

  title.textContent = task.name;

  if (ps) {
    const linksHtml = ps.links && ps.links.length
      ? `<div><div class="gantt-popup-section-title">Documents</div><div class="gantt-popup-links">${ps.links.map(l=>`<a class="ps-link" href="${l.url}" target="_blank" rel="noopener">📄 ${l.label}</a>`).join('')}</div></div>`
      : '';
    const actionsHtml = ps.actions && ps.actions.length
      ? `<div><div class="gantt-popup-section-title">Open Actions</div>${ps.actions.map(a=>`<div style="font-family:var(--font-ui);font-size:12px;margin-bottom:4px"><strong>${a.owner}</strong> — ${a.task||a.issue}</div>`).join('')}</div>`
      : '';
    body.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px">
        <span class="status-badge ${ps.status}">${statusLabels[ps.status]||ps.status}</span>
        <span style="font-family:var(--font-ui);font-size:11px;color:var(--color-text-subtle)">👤 ${ps.owner} &nbsp;·&nbsp; 📅 ${ps.timeline}</span>
      </div>
      ${ps.summary ? `<div><div class="gantt-popup-section-title">Summary</div><div class="gantt-popup-text">${ps.summary}</div></div>` : ''}
      ${ps.risks   ? `<div><div class="gantt-popup-section-title">⚠️ Risks</div><div class="gantt-popup-text" style="color:var(--color-warning)">${ps.risks}</div></div>` : ''}
      ${ps.blockers? `<div><div class="gantt-popup-section-title">🚧 Blockers</div><div class="gantt-popup-text" style="color:var(--color-danger)">${ps.blockers}</div></div>` : ''}
      ${actionsHtml}
      ${linksHtml}`;
  } else {
    body.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px">
        <span class="status-badge ${task.status}">${statusLabels[task.status]||task.status}</span>
        <span style="font-family:var(--font-ui);font-size:11px;color:var(--color-text-subtle)">👤 ${task.owner||'—'} &nbsp;·&nbsp; 📅 ${task.start} → ${task.end}</span>
      </div>
      <div style="font-family:var(--font-body);font-size:13px;color:var(--color-text-subtle)">No detailed status on file for this task.</div>`;
  }

  // Position popup near click, keep inside viewport
  popup.style.display = 'block';
  popup.classList.add('open');
  const pw = popup.offsetWidth, ph = popup.offsetHeight;
  let px = x + 12, py = y + 12;
  if (px + pw > window.innerWidth  - 12) px = x - pw - 12;
  if (py + ph > window.innerHeight - 12) py = y - ph - 12;
  popup.style.left = Math.max(8, px) + 'px';
  popup.style.top  = Math.max(8, py) + 'px';
}

document.getElementById('gantt-popup-close').addEventListener('click', () => {
  document.getElementById('gantt-popup').classList.remove('open');
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('gantt-popup').classList.remove('open');
});

/* ────────────────────────────────────────────────
   INIT
──────────────────────────────────────────────── */
renderGantt();
renderReports();
renderNews();
renderWiki();
renderProjectStatus();
</script>
</body>
